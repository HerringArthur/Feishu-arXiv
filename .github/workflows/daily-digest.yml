name: Daily Arxiv Digest

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      categories:
        description: 'Categories (comma-separated)'
        required: false
        default: 'cs.CL,cs.AI,cs.LG'
      keywords:
        description: 'Keywords (comma-separated)'
        required: false
        default: ''
      threshold:
        description: 'Relevance threshold (0-1)'
        required: false
        default: '0.75'
      lookback:
        description: 'Lookback days'
        required: false
        default: '1'

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run digest
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          python scripts/digest.py \
            --categories "${{ github.event.inputs.categories || 'cs.CL,cs.AI,cs.LG' }}" \
            --keywords "${{ github.event.inputs.keywords || '' }}" \
            --threshold "${{ github.event.inputs.threshold || '0.75' }}" \
            --lookback "${{ github.event.inputs.lookback || '1' }}"
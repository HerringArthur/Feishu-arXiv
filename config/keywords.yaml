# 关键词 + 类别配置
# digest.py 会读取此文件来决定抓取哪些类别的论文，以及用什么关键词打分

categories:
  - cs.CL
  - cs.AI
  - cs.LG
  # - cs.CV
  # - cs.IR

keywords:
  - agent
  - RAG
  - retrieval augmented generation
  - tool use
  - reasoning
  - planning
  - multi-agent
  - memory

# 打分阈值：只推送分数 >= threshold 的论文（0-1，推荐 0.75）
threshold: 0.75

# LLM 打分时使用的模型（可选覆盖 GitHub Secrets 中的 LLM_MODEL）
# scoring_model: "gpt-4o-mini"

# 速递摘要模型
# digest_model: "gpt-4o-mini"

# 每天最多推送篇数
max_papers: 10

# 查询天数（查最近 N 天的新论文）
lookback_days: 1
